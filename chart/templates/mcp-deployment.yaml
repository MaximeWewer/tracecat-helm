{{- if .Values.mcp.enabled }}
{{- include "tracecat.validateRequiredSecrets" . -}}
{{- include "tracecat.validateInfrastructure" . -}}
{{- include "tracecat.validateMcpConfig" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracecat.fullname" . }}-mcp
  labels:
    {{- include "tracecat.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicas }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "tracecat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        {{- include "tracecat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
      {{- if .Values.reloader.enabled }}
      annotations:
        reloader.stakater.com/auto: "true"
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      serviceAccountName: {{ include "tracecat.serviceAccountName" . }}
      {{- include "tracecat.podScheduling" (dict "root" . "component" "mcp") | nindent 6 }}
      initContainers:
        {{- include "tracecat.initWaitPostgres" . | nindent 8 }}
      containers:
        - name: mcp
          image: "{{ include "tracecat.backendImage" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "tracecat.mcp"]
          {{- include "tracecat.containerSecurityContext" . | nindent 10 }}
          ports:
            - name: http
              containerPort: {{ .Values.mcp.port }}
              protocol: TCP
          env:
            {{- include "tracecat.env.mcp" . | nindent 12 }}
            {{- include "tracecat.env.secrets" . | nindent 12 }}
          {{- include "tracecat.extraEnvFrom" . | nindent 10 }}
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- include "tracecat.postgres.caVolumeMount" . | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- include "tracecat.postgres.caVolume" . | nindent 8 }}
{{- end }}
