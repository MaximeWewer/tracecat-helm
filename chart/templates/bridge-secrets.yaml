{{- if .Values.bridgeSecrets.enabled }}
{{- /*
Chart-managed "glue" secrets wiring the bundled deps (CNPG/redis/rustfs) to
Tracecat. Value precedence per field: inline (bridgeSecrets.values.*) > existing
in-cluster secret (`lookup`) > random.
Set bridgeSecrets.values.* to pin every sensitive value in Git when no secret
manager is available — this is required under Argo CD / any `helm template`
flow, where `lookup` returns nothing so the random branch would otherwise
re-roll the Fernet dbEncryptionKey on every sync and orphan all encrypted data.
Disable this block (bridgeSecrets.enabled=false) when supplying these via
existingSecret / External Secrets Operator instead.
*/}}
{{- $ns := .Release.Namespace }}
{{- $v := .Values.bridgeSecrets.values | default dict }}
{{- $coreName := .Values.bridgeSecrets.coreSecretName }}
{{- $core := (lookup "v1" "Secret" $ns $coreName) }}
{{- $dbKey := "" }}{{- $svcKey := "" }}{{- $signing := "" }}{{- $userAuth := "" }}{{- $litellmKey := "" }}
{{- if and $core $core.data (index $core.data "dbEncryptionKey") }}
{{- $dbKey = index $core.data "dbEncryptionKey" | b64dec }}
{{- $svcKey = index $core.data "serviceKey" | b64dec }}
{{- $signing = index $core.data "signingSecret" | b64dec }}
{{- $userAuth = index $core.data "userAuthSecret" | b64dec }}
{{- $litellmKey = (index $core.data "litellmMasterKey" | default (printf "sk-%s" $svcKey | b64enc)) | b64dec }}
{{- else }}
{{- $dbKey = randAlphaNum 32 | b64enc | replace "+" "-" | replace "/" "_" }}
{{- $svcKey = randAlphaNum 64 }}
{{- $signing = randAlphaNum 64 }}
{{- $userAuth = randAlphaNum 64 }}
{{- $litellmKey = printf "sk-%s" (randAlphaNum 48) }}
{{- end }}
{{- /* Inline values win over lookup/random for deterministic, Argo-safe secrets. */}}
{{- if $v.dbEncryptionKey }}{{- $dbKey = $v.dbEncryptionKey }}{{- end }}
{{- if $v.serviceKey }}{{- $svcKey = $v.serviceKey }}{{- end }}
{{- if $v.signingSecret }}{{- $signing = $v.signingSecret }}{{- end }}
{{- if $v.userAuthSecret }}{{- $userAuth = $v.userAuthSecret }}{{- end }}
{{- if $v.litellmMasterKey }}{{- $litellmKey = $v.litellmMasterKey }}{{- end }}
{{- $s3Name := .Values.bridgeSecrets.s3SecretName }}
{{- $s3 := (lookup "v1" "Secret" $ns $s3Name) }}
{{- $accessKey := "" }}{{- $secretKey := "" }}
{{- if and $s3 $s3.data (index $s3.data "accessKeyId") }}
{{- $accessKey = index $s3.data "accessKeyId" | b64dec }}
{{- $secretKey = index $s3.data "secretAccessKey" | b64dec }}
{{- else }}
{{- $accessKey = printf "tracecat-%s" (randAlphaNum 16 | lower) }}
{{- $secretKey = randAlphaNum 40 }}
{{- end }}
{{- if $v.s3AccessKeyId }}{{- $accessKey = $v.s3AccessKeyId }}{{- end }}
{{- if $v.s3SecretAccessKey }}{{- $secretKey = $v.s3SecretAccessKey }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $coreName }}
  {{- if .Values.bridgeSecrets.retain }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
  labels:
    {{- include "tracecat.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  dbEncryptionKey: {{ $dbKey | quote }}
  serviceKey: {{ $svcKey | quote }}
  signingSecret: {{ $signing | quote }}
  userAuthSecret: {{ $userAuth | quote }}
  litellmMasterKey: {{ $litellmKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.bridgeSecrets.redisSecretName }}
  {{- if .Values.bridgeSecrets.retain }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
  labels:
    {{- include "tracecat.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
stringData:
  # REDIS_URL for the bundled CloudPirates redis (auth disabled).
  url: {{ printf "redis://%s:%v" (include "tracecat.redisServiceName" .) .Values.bridgeSecrets.redisPort | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $s3Name }}
  {{- if .Values.bridgeSecrets.retain }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
  labels:
    {{- include "tracecat.labels" . | nindent 4 }}
    app.kubernetes.io/component: s3
type: Opaque
stringData:
  # Consumed by Tracecat (externalS3.auth.existingSecret).
  accessKeyId: {{ $accessKey | quote }}
  secretAccessKey: {{ $secretKey | quote }}
  # Consumed by the RustFS subchart (secret.existingSecret) — same credentials.
  RUSTFS_ACCESS_KEY: {{ $accessKey | quote }}
  RUSTFS_SECRET_KEY: {{ $secretKey | quote }}
{{- end }}
