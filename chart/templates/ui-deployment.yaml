apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracecat.fullname" . }}-ui
  labels:
    {{- include "tracecat.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "tracecat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "tracecat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- include "tracecat.podScheduling" (dict "root" . "component" "ui") | nindent 6 }}
      containers:
        - name: ui
          image: "{{ include "tracecat.uiImageRef" . }}"
          imagePullPolicy: {{ .Values.uiImage.pullPolicy }}
          {{- include "tracecat.containerSecurityContext" . | nindent 10 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- include "tracecat.env.ui" . | nindent 12 }}
            {{- include "tracecat.env.secrets.ui" . | nindent 12 }}
          {{- include "tracecat.extraEnvFrom" . | nindent 10 }}
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/apps/web/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
