apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracecat.fullname" . }}-agent-worker
  labels:
    {{- include "tracecat.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-worker
spec:
  {{- if not (and .Values.keda.enabled .Values.autoscaling.agentWorker.enabled) }}
  replicas: {{ .Values.agentWorker.replicas }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "tracecat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent-worker
  template:
    metadata:
      labels:
        {{- include "tracecat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent-worker
      {{- if or .Values.reloader.enabled (and .Values.tracecat.temporal.metrics.enabled .Values.tracecat.temporal.metrics.scrape) .Values.podAnnotations }}
      annotations:
        {{- if .Values.reloader.enabled }}
        reloader.stakater.com/auto: "true"
        {{- end }}
        {{- if and .Values.tracecat.temporal.metrics.enabled .Values.tracecat.temporal.metrics.scrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.tracecat.temporal.metrics.port | quote }}
        prometheus.io/path: {{ .Values.tracecat.temporal.metrics.path | default "/metrics" | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      serviceAccountName: {{ include "tracecat.agentWorkerServiceAccountName" . }}
      {{- include "tracecat.podScheduling" (dict "root" . "component" "agent-worker") | nindent 6 }}
      initContainers:
        {{- include "tracecat.initWaitPostgres" . | nindent 8 }}
      containers:
        - name: agent-worker
          image: "{{ include "tracecat.backendImage" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "tracecat.agent.worker"]
          {{- include "tracecat.containerSecurityContext" . | nindent 10 }}
          {{- if .Values.tracecat.temporal.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.tracecat.temporal.metrics.port }}
              protocol: TCP
          {{- end }}
          {{- include "tracecat.workerLivenessProbe" . | nindent 10 }}
          env:
            {{- include "tracecat.env.agentWorker" . | nindent 12 }}
            {{- include "tracecat.env.secrets" . | nindent 12 }}
          {{- include "tracecat.extraEnvFrom" . | nindent 10 }}
          resources:
            {{- toYaml .Values.agentWorker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- include "tracecat.postgres.caVolumeMount" . | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- include "tracecat.postgres.caVolume" . | nindent 8 }}
