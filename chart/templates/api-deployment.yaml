{{- include "tracecat.validateRequiredSecrets" . -}}
{{- include "tracecat.validateAuthConfig" . -}}
{{- include "tracecat.validateInfrastructure" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracecat.fullname" . }}-api
  labels:
    {{- include "tracecat.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "tracecat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "tracecat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- if or .Values.reloader.enabled .Values.podAnnotations }}
      annotations:
        {{- if .Values.reloader.enabled }}
        reloader.stakater.com/auto: "true"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      serviceAccountName: {{ include "tracecat.serviceAccountName" . }}
      {{- include "tracecat.podScheduling" (dict "root" . "component" "api") | nindent 6 }}
      initContainers:
        {{- include "tracecat.initWaitPostgres" . | nindent 8 }}
      containers:
        - name: api
          image: "{{ include "tracecat.backendImage" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "tracecat.containerSecurityContext" . | nindent 10 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- include "tracecat.env.api" . | nindent 12 }}
            {{- include "tracecat.env.secrets.api" . | nindent 12 }}
          {{- include "tracecat.extraEnvFrom" . | nindent 10 }}
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- include "tracecat.postgres.caVolumeMount" . | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- include "tracecat.postgres.caVolume" . | nindent 8 }}
