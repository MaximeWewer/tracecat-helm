apiVersion: v2
name: tracecat
description: Tracecat (SOAR / AI automation)
type: application
version: 1.0.0
appVersion: "1.0.0-beta.49"
kubeVersion: ">=1.25.0-0"
home: https://tracecat.com
icon: https://avatars.githubusercontent.com/u/142434153?s=200&v=4
sources:
  - https://github.com/TracecatHQ/tracecat
keywords:
  - soar
  - automation
  - workflow
  - security
maintainers:
  - name: Maxime Wewer
annotations:
  category: Security
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Tracecat
      url: https://tracecat.com
    - name: Documentation
      url: https://docs.tracecat.com
  artifacthub.io/prerelease: "true"
dependencies:
  - name: temporal
    version: "1.2.0"
    repository: "https://go.temporal.io/helm-charts"
    condition: temporal.enabled
  - name: redis
    version: "0.30.4"
    repository: "oci://registry-1.docker.io/cloudpirates"
    condition: redis.enabled
  - name: rustfs
    version: "0.8.0"
    repository: "https://charts.rustfs.com"
    condition: rustfs.enabled
